name: 진단 - 법제처 연결 테스트

# 수동 실행 전용 (자동 스케줄 없음 → GitHub 시간 거의 안 먹음)
on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
    - name: 🩺 네트워크 진단 (어디가 막혔는지 확인)
      run: |
        echo "==================================================="
        echo "이 GitHub Actions 서버의 위치(IP) 정보"
        echo "==================================================="
        curl -s --max-time 10 https://ipinfo.io/json || echo "ipinfo 조회 실패"
        echo ""
        echo "==================================================="
        echo "[테스트 1] 구글 접속 (대조군 - 해외 사이트)"
        echo "==================================================="
        if curl -s --max-time 15 -o /dev/null -w "구글 응답코드: %{http_code} / 소요시간: %{time_total}초\n" https://www.google.com; then
          echo "✅ 구글 연결 성공 → GitHub 인터넷 자체는 정상"
        else
          echo "❌ 구글도 실패 → GitHub 네트워크 전체 문제 (드문 경우)"
        fi
        echo ""
        echo "==================================================="
        echo "[테스트 2] 법제처 메인 페이지 접속"
        echo "==================================================="
        if curl -s --max-time 30 -o /dev/null -w "법제처 응답코드: %{http_code} / 소요시간: %{time_total}초\n" https://www.law.go.kr; then
          echo "✅ 법제처 메인 연결됨"
        else
          echo "❌ 법제처 메인 연결 실패 (타임아웃/차단)"
        fi
        echo ""
        echo "==================================================="
        echo "[테스트 3] 법제처 OpenAPI 실제 호출"
        echo "==================================================="
        echo "* OC는 가짜값(test)이라 인증은 실패하겠지만,"
        echo "  '연결이 되는지'만 보면 됩니다."
        HTTP=$(curl -s --max-time 30 -o /tmp/resp.txt -w "%{http_code}" \
          "https://www.law.go.kr/DRF/lawSearch.do?OC=test&target=law&type=XML&display=3" \
          && echo OK || echo TIMEOUT)
        echo "결과: $HTTP"
        echo "--- 응답 내용 일부 ---"
        head -c 500 /tmp/resp.txt 2>/dev/null || echo "(응답 없음)"
        echo ""
        echo ""
        echo "==================================================="
        echo "[테스트 4] 법제처 IP 직접 확인 (DNS는 되는지)"
        echo "==================================================="
        nslookup www.law.go.kr || echo "DNS 조회 실패"
        echo ""
        echo "==================================================="
        echo "진단 완료 — 위 결과를 Claude에게 보여주세요"
        echo "==================================================="
