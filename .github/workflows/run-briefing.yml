# =====================================================================
# 월별 이슈브리핑 + 모니터링 결과 자동 생성 워크플로우
# =====================================================================
# [사용법]
#   ▶ 자동: 매달 2일 오전 9시(KST)에 지난달 보고서가 자동 생성·발송됩니다.
#   ▶ 수동: Actions 탭 → "이슈브리핑 생성" → Run workflow → (선택) 월 입력 → 실행
#           월을 비워두면 '지난달'이 자동 선택됩니다.
#   → 1~2분 후 생성된 보고서가 메일로 발송됨 (Make.com 웹훅)
#   → (백업) Actions 실행 페이지 하단 "Artifacts"에서도 다운로드 가능
#
# [필요한 GitHub Secrets] (Settings → Secrets and variables → Actions)
#   GCP_SA_JSON, GOOGLE_SHEET_ID, GEMINI_API_KEY, BRIEFING_WEBHOOK_URL
#   ※ 전체 시행 법령 수는 총괄현황표의 '총 검토건수'에서 가져오므로 법제처 API 불필요.
#   ※ BRIEFING_WEBHOOK_URL은 monitor 일일 알림과 분리된 '새 웹훅'입니다.
# =====================================================================

name: 이슈브리핑 생성

on:
  # ① 자동 실행: 매달 2일 오전 9시(KST)
  #    GitHub Actions는 UTC 기준이므로, KST 09:00 = UTC 00:00 (전날 -9시간이 아니라
  #    같은 날 자정). cron은 "분 시 일 월 요일" 순서. 아래는 매월 2일 00:00 UTC.
  schedule:
    - cron: "0 0 2 * *"
  # ② 수동 실행: 월 입력 (비워두면 지난달 자동 선택)
  workflow_dispatch:
    inputs:
      target_month:
        description: "생성할 월 (YYYYMM, 예: 202601). 비우면 지난달 자동."
        required: false
        type: string
        default: ""

jobs:
  build-briefing:
    runs-on: ubuntu-latest

    steps:
      # 1) 코드 내려받기
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      # 2) 파이썬 설치
      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3) 한글 폰트 설치 (차트·docx 한글 깨짐 방지) — 매우 중요!
      - name: 한글 폰트 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-nanum
          sudo fc-cache -fv

      # 4) LibreOffice 설치 (docx 검증/변환에 사용 — 선택이지만 권장)
      #    무거우면 생략 가능. 생략 시 docx는 그대로 생성됨.
      # - name: LibreOffice 설치
      #   run: sudo apt-get install -y libreoffice

      # 5) 파이썬 패키지 설치
      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 이슈브리핑 전용 추가 패키지
          pip install python-docx openpyxl matplotlib
          # 공유 코어 라이브러리 (시트 인증·LLM 클라이언트 재사용)
          pip install git+https://github.com/gjtjdwns1008-dev/hrdk-law-core.git

      # 6) 이슈브리핑 생성 실행
      - name: 이슈브리핑 생성
        env:
          TARGET_MONTH: ${{ github.event.inputs.target_month }}
          GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BRIEFING_WEBHOOK_URL: ${{ secrets.BRIEFING_WEBHOOK_URL }}
          OUTPUT_DIR: "output"
          # 웹검색(상세분석 자세히): true=켜기(기본), false=끄기
          # 검색이 안 되거나 실패하면 자동으로 시트 기반 작성으로 폴백됩니다.
          USE_WEB_SEARCH: "true"
          # 모델 지정 (웹검색은 gemini-2.5 계열에서 더 안정적).
          # 주석을 풀어 모델을 고정할 수 있습니다.
          # LLM_MODEL: "gemini-2.5-flash"
        run: |
          python briefing_maker.py

      # 7) 생성된 보고서를 Artifact로 업로드 (메일 외 백업 다운로드 경로)
      - name: 보고서 업로드
        if: always()  # 실패해도 일단 생성된 게 있으면 올림
        uses: actions/upload-artifact@v4
        with:
          # 자동 실행 땐 입력값이 비므로, 실행 날짜·번호로 이름을 짓는다.
          # (실제 파일명에는 대상 월이 들어가 있어 zip 안에서 구분 가능)
          name: 이슈브리핑-run${{ github.run_number }}
          path: output/*
          retention-days: 30
          if-no-files-found: warn
