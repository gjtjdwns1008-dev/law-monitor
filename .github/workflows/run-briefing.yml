# =====================================================================
# 월별 이슈브리핑 + 모니터링 결과 자동 생성 워크플로우
# =====================================================================
# [사용법]
#   GitHub 저장소 → Actions 탭 → "이슈브리핑 생성" 선택
#   → "Run workflow" 클릭 → 월(예: 202601) 입력 → 실행
#   → 1~2분 후 생성된 보고서가 메일로 발송됨 (Make.com 웹훅)
#   → (백업) Actions 실행 페이지 하단 "Artifacts"에서도 다운로드 가능
#
# [필요한 GitHub Secrets] (Settings → Secrets and variables → Actions)
#   GCP_SA_JSON, GOOGLE_SHEET_ID, GEMINI_API_KEY, BRIEFING_WEBHOOK_URL
#   (LAW_API_KEY는 선택 — 전체 시행건수 통계용)
#   ※ BRIEFING_WEBHOOK_URL은 monitor 일일 알림과 분리된 '새 웹훅'입니다.
# =====================================================================

name: 이슈브리핑 생성

# 수동 실행만 (자동 스케줄 없음). 월 입력을 받는다.
on:
  workflow_dispatch:
    inputs:
      target_month:
        description: "생성할 월 (YYYYMM 형식, 예: 202601)"
        required: true
        type: string

jobs:
  build-briefing:
    runs-on: ubuntu-latest

    steps:
      # 1) 코드 내려받기
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      # 2) 파이썬 설치
      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3) 한글 폰트 설치 (차트·docx 한글 깨짐 방지) — 매우 중요!
      - name: 한글 폰트 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-nanum
          sudo fc-cache -fv

      # 4) LibreOffice 설치 (docx 검증/변환에 사용 — 선택이지만 권장)
      #    무거우면 생략 가능. 생략 시 docx는 그대로 생성됨.
      # - name: LibreOffice 설치
      #   run: sudo apt-get install -y libreoffice

      # 5) 파이썬 패키지 설치
      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 이슈브리핑 전용 추가 패키지
          pip install python-docx openpyxl matplotlib
          # 공유 코어 라이브러리 (시트 인증·LLM 클라이언트 재사용)
          pip install git+https://github.com/gjtjdwns1008-dev/hrdk-law-core.git

      # 6) 이슈브리핑 생성 실행
      - name: 이슈브리핑 생성
        env:
          TARGET_MONTH: ${{ github.event.inputs.target_month }}
          GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LAW_API_KEY: ${{ secrets.LAW_API_KEY }}
          BRIEFING_WEBHOOK_URL: ${{ secrets.BRIEFING_WEBHOOK_URL }}
          OUTPUT_DIR: "output"
          # 모델 교체하고 싶으면 아래 주석 해제 (기본: 코어 기본값)
          # LLM_MODEL: "gemini-2.5-pro"
        run: |
          python briefing_maker.py

      # 7) 생성된 보고서를 Artifact로 업로드 (메일 외 백업 다운로드 경로)
      - name: 보고서 업로드
        if: always()  # 실패해도 일단 생성된 게 있으면 올림
        uses: actions/upload-artifact@v4
        with:
          name: 이슈브리핑-${{ github.event.inputs.target_month }}
          path: output/*
          retention-days: 30
          if-no-files-found: warn
