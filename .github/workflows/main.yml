name: 🤖 HRDKorea 일일 법령 모니터링 자동화

on:
  schedule:
    # 한국 시간 아침 7시 30분 실행 (UTC 기준 22:30)
    - cron: '30 22 * * *' 
  workflow_dispatch: # 수동 실행 버튼 유지

jobs:
  run_daily_report:
    runs-on: ubuntu-latest
    # 👇 깃허브의 노란색 경고장(Node.js 20)을 영구 삭제하는 마법의 주문!
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 파이썬 환경 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 필요 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas google-genai openpyxl gspread oauth2client

      - name: 🚀 엑셀 공장 가동 및 구글 시트 연동
        env: 
          LAW_API_KEY: ${{ secrets.LAW_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          # 🔥 구글 시트 출입증 2개 추가 완료! 🔥
          GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python -u main.py
