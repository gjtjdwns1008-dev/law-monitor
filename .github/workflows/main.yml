name: Daily Law Monitor V29

on:
  schedule:
    # 🎲 하루 5회, 한국시간 기준 랜덤 분산 (RADAR와 겹치지 않는 시각).
    # GitHub IP 무작위 추첨 → 여러 번 시도로 당첨 확률↑. 백필이 중복 처리 방지.
    # (cron은 UTC 기준. 한국시간 = UTC + 9)
    - cron: '38 20 * * *'   # KST 05:38
    - cron: '22 0 * * *'    # KST 09:22
    - cron: '56 4 * * *'    # KST 13:56
    - cron: '41 8 * * *'    # KST 17:41
    - cron: '17 13 * * *'   # KST 22:17
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
    - name: 📂 소스 코드 가져오기
      uses: actions/checkout@v4

    - name: 🐍 파이썬 환경 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 필수 라이브러리 설치
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python -m pip install --upgrade pip
        git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
        pip install -r requirements.txt

    - name: 🌐 [진단] 이번 실행 서버 IP 확인
      run: |
        echo "=================================================="
        echo "이번 GitHub Actions 실행 서버의 IP 정보"
        echo "=================================================="
        curl -s --max-time 10 https://ipinfo.io/json | grep -E '"ip"|"city"|"country"|"org"' || echo "IP 조회 실패"
        echo "=================================================="

    - name: "🚀 메인 스크립트 실행 (백필 - 안 되는 날은 즉시 종료, 다음 날 따라잡기)"
      env:
        LAW_API_KEY: ${{ secrets.LAW_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
        DB_PATH: hrdk_law.db
      run: |
        # 백필 구조: main.py가 스스로 연결 확인 → 안 되면 종료(다음 날 자동 따라잡기).
        # 5분 재시도 루프는 불필요해 제거 (IP 차단일에 시간 낭비 방지).
        python main.py
