name: 🤖 HRDKorea 일일 법령 모니터링 자동화

on:
  workflow_dispatch: # 선생님이 버튼을 눌러서 수동으로 즉시 실행하는 기능
  schedule:
    - cron: '30 22 * * *' # 매일 아침 07:30 KST (UTC 22:30) 자동 실행

jobs:
  run_daily_report:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 소스 코드 가져오기
        uses: actions/checkout@v4

      - name: 🐍 파이썬 3.10 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 필요 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl google-generativeai

      - name: 🚀 엑셀 공장 가동 및 이메일 발송
        env: # 2단계에서 만든 금고 열쇠를 파이썬에 전달!
          LAW_API_KEY: ${{ secrets.LAW_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: python -u main.py
