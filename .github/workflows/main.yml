name: Daily Law Monitor V29

on:
  schedule:
    # ⏰ 깃허브는 UTC 기준이므로, 한국 새벽 5시 = UTC 전날 밤 8시(20)입니다.
    - cron: '23 20 * * *'
  workflow_dispatch: # 🔘 수동으로 테스트 실행할 수 있는 버튼을 만들어줍니다.

jobs:
  run-monitor:
    runs-on: ubuntu-latest # 깃허브가 빌려주는 가상 리눅스 컴퓨터

    steps:
    - name: 📂 소스 코드 가져오기
      uses: actions/checkout@v4

    - name: 🐍 파이썬 환경 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # 안정적인 파이썬 3.11 버전 사용

    - name: 📦 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests google-genai openpyxl gspread oauth2client

    - name: 🚀 V29 메인 스크립트 실행
      env:
        # 💡 깃허브 보안 창고(Secrets)에서 비밀번호들을 꺼내옵니다.
        LAW_API_KEY: ${{ secrets.LAW_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
      run: python main.py
