name: 진단 - 법제처 과거날짜 조회 테스트

# 수동 실행 전용. 실제 OC 키(LAW_API_KEY)를 사용해 과거 날짜 조회가 되는지 확인.
on:
  workflow_dispatch:

jobs:
  test-backfill:
    runs-on: ubuntu-latest
    env:
      LAW_API_KEY: ${{ secrets.LAW_API_KEY }}
    steps:
    - name: 🌐 이번 실행 IP
      run: |
        echo "IP: $(curl -s --max-time 10 https://ipinfo.io/ip || echo unknown)"

    - name: 🔌 법제처 연결 가능 여부 (되는 날인지)
      run: |
        CODE=$(curl -s --max-time 20 -o /dev/null -w "%{http_code}" https://www.law.go.kr || echo TIMEOUT)
        echo "법제처 메인 연결: $CODE"
        if [ "$CODE" = "TIMEOUT" ] || [ "$CODE" = "000" ]; then
          echo "❌ 오늘은 IP 차단일입니다. 이 테스트는 '되는 날'에 다시 실행하세요."
          echo "   (그래도 아래 조회 테스트는 시도해봅니다)"
        else
          echo "✅ 오늘은 연결되는 날입니다. 조회 테스트 진행."
        fi

    - name: 📅 과거 날짜별 조회 테스트 (어제 / 3일 전 / 7일 전 / 30일 전)
      run: |
        # 실제 OC 키로 여러 과거 날짜를 조회해 데이터가 나오는지 확인
        HEADERS=(-H "Referer: https://www.law.go.kr/" \
                 -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36")

        for DAYS in 1 3 7 30 90; do
          D=$(date -u -d "$DAYS days ago" +%Y%m%d)
          echo "=================================================="
          echo "[$DAYS일 전 = $D] 시행일자 조회 테스트"
          echo "=================================================="
          OUT=$(curl -s --max-time 30 "${HEADERS[@]}" \
            "https://www.law.go.kr/DRF/lawSearch.do?OC=${LAW_API_KEY}&target=law&type=XML&efYd=${D}~${D}&display=5")
          # 응답에서 핵심만 추출
          if echo "$OUT" | grep -q "검증에 실패"; then
            echo "  ⚠️ 사용자 검증 실패 (Referer/IP 문제 - 이 날은 차단)"
          elif echo "$OUT" | grep -q "totalCnt"; then
            CNT=$(echo "$OUT" | grep -o "<totalCnt>[0-9]*</totalCnt>" | head -1 | grep -o "[0-9]*")
            echo "  ✅ 조회 성공! 해당일 시행 법령 건수(totalCnt): $CNT"
          else
            echo "  ❓ 예상외 응답:"
            echo "$OUT" | head -c 300
          fi
          echo ""
          sleep 2
        done
        echo "=================================================="
        echo "판정 기준:"
        echo " - 여러 과거 날짜에서 'totalCnt'가 나오면 → 과거 조회 가능 (백필 설계 OK)"
        echo " - 모두 '검증 실패'면 → 오늘이 차단일 (되는 날 재실행)"
        echo "=================================================="
